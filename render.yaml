# Render blueprint for the TwoTable backend.
#
# Deploy: Render dashboard → New → Blueprint → select this repo. Render reads this file,
# creates the service, and prompts for the secret values marked sync: false.
#
# NOTE on plans: the semantic-embedding model needs ~1GB RAM, so EMBEDDING_PROVIDER is
# "off" here to fit the free tier (matching gracefully degrades to the non-semantic
# signals). On a Standard (2GB) instance, set EMBEDDING_PROVIDER=local to restore full
# intent matching.
services:
  - type: web
    name: twotable-backend
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.6"
      - key: MONGODB_URI          # your Atlas connection string — entered in the dashboard
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true       # Render generates a strong secret
      - key: PUBLIC_BASE_URL      # must match the service URL (photo links are built from it)
        value: "https://twotable-backend-new.onrender.com"
      - key: APP_ENV
        value: "production"
      - key: EMBEDDING_PROVIDER   # "off" fits the free tier; "local" on >=2GB instances
        value: "off"
      - key: DEV_OTP_CODE         # TODO: replace phone auth with real SMS before launch
        value: "12345"
      - key: MAPBOX_TOKEN         # optional: enables live traffic-aware routing
        sync: false
